
{% load i18n %}
<aside class="rw-rail" role="navigation" aria-label="{% trans 'ناڤیگەیشنی سەرەکی' %}">

  
  <a href="{% url 'projects:list' %}" class="rw-rail-logo" title="ڕوانگە">ڕ</a>

  
  <a href="{% url 'projects:list' %}"
     class="rw-rail-icon {% if request.resolver_match.app_name == 'projects' and not active_project %}active{% endif %}"
     title="{% trans 'پڕۆژەکان' %}">
    ⊞
  </a>

  <a href="{% url 'accounts:team' %}"
     class="rw-rail-icon {% if request.resolver_match.app_name == 'accounts' %}active{% endif %}"
     title="{% trans 'تیم' %}">
    ◎
  </a>

  <a href="{% url 'locations:list' %}"
     class="rw-rail-icon {% if request.resolver_match.app_name == 'locations' %}active{% endif %}"
     title="{% trans 'شوێنەکان' %}">
    ◈
  </a>

  <div class="rw-rail-sep"></div>

  <a href="{% url 'accounts:settings' %}"
     class="rw-rail-icon {% if request.resolver_match.url_name == 'settings' %}active{% endif %}"
     title="{% trans 'ڕێکخستن' %}">
    ⚙
  </a>

  <div class="rw-rail-spacer"></div>

  
  <button class="rw-rail-icon" style="position:relative" title="{% trans 'ئاگادارکردنەوەکان' %}"
          hx-get="{% url 'notifications:panel' %}"
          hx-target="#rw-notif-panel"
          hx-swap="outerHTML">
    🔔
    <span class="rw-notif-badge" id="rw-notif-count"
          {% if unread_count == 0 %}style="display:none"{% endif %}></span>
  </button>

  
  <button class="rw-rail-theme js-theme-toggle"
          onclick="RW.themeToggle()"
          title="{% trans 'گۆڕینی شێوازی ڕووکار' %}">☀</button>

</aside>
