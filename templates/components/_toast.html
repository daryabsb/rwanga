
<div class="rw-toast {{ type|default:'info' }}"
     hx-swap-oob="beforeend:#rw-toasts"
     x-data
     x-init="setTimeout(() => $el.remove(), 4000)">
  <span style="font-size:16px;font-weight:700;flex-shrink:0">
    {% if type == 'success' %}✓{% elif type == 'error' %}✕{% elif type == 'warning' %}⚠{% else %}·{% endif %}
  </span>
  {{ message }}
</div>
