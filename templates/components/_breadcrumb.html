
<div class="rw-breadcrumb" aria-label="breadcrumb">
  {% for crumb in crumbs %}
    <a href="{{ crumb.url }}" class="rw-crumb-back">← {{ crumb.label }}</a>
    <span class="rw-crumb-sep">/</span>
  {% endfor %}
  <span class="rw-crumb-node">{{ current }}</span>
  {% if location %}<span class="rw-crumb-sep">/</span><span class="rw-crumb-leaf">{{ location }}</span>{% endif %}
</div>
