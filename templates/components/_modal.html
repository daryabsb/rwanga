
{% load i18n %}


<div class="rw-modal-backdrop" id="rw-modal-container"
     onclick="if(event.target===this) rwCloseModal()"
     hx-swap-oob="innerHTML:#rw-modal-container">

  <div class="rw-modal {% if size == 'sm' %}rw-modal-sm{% elif size == 'lg' %}rw-modal-lg{% elif size == 'xl' %}rw-modal-xl{% endif %}"
       role="dialog"
       aria-modal="true"
       aria-labelledby="rw-modal-title">

    <div class="rw-modal-header">
      <span id="rw-modal-title" style="font-size:16px;font-weight:700">{{ title }}</span>
      <button onclick="rwCloseModal()"
              style="background:none;border:none;color:var(--rw-text-2);font-size:20px;cursor:pointer;line-height:1"
              aria-label="{% trans 'داخستن' %}">✕</button>
    </div>

    <div class="rw-modal-body" id="rw-modal-body">
      {% if body_template %}
        {% include body_template %}
      {% else %}
        {% block modal_body %}{% endblock %}
      {% endif %}
    </div>

    {% block modal_footer %}
    <div class="rw-modal-footer">
      <button onclick="rwCloseModal()" class="rw-btn rw-btn-ghost">
        {% trans "داخستن" %}
      </button>
      <button type="submit" form="rw-modal-form" class="rw-btn rw-btn-primary">
        {% trans "پاشەکەوتکردن" %}
      </button>
    </div>
    {% endblock %}

  </div>
</div>

<script>
function rwCloseModal() {
  document.getElementById('rw-modal-container').innerHTML = '';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') rwCloseModal();
});
</script>


<style>
.rw-modal-sm { max-width: 380px; }
.rw-modal-lg { max-width: 720px; }
.rw-modal-xl { max-width: 960px; }
</style>
