<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rwanga — Review System Templates Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0F0F12;color:#EDEAD8;font-size:14px;min-height:100vh;margin:0;}

/* ── SWITCHER ── */
#switcher{
  position:sticky;top:0;z-index:200;
  background:#17171C;border-bottom:1px solid #2C2C38;
  display:flex;align-items:center;gap:0;padding:0 20px;height:52px;
}
.sw-logo{width:36px;height:36px;background:#F72585;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;font-family:'Cairo',sans-serif;margin-inline-end:16px;flex-shrink:0;}
.sw-label{font-size:12px;font-weight:700;color:#40404E;text-transform:uppercase;letter-spacing:1px;margin-inline-end:20px;white-space:nowrap;}
.sw-btn{padding:0 20px;height:52px;font-size:13px;font-weight:600;background:none;border:none;border-bottom:3px solid transparent;color:#78788C;cursor:pointer;transition:color .12s,border-color .12s;white-space:nowrap;font-family:'Cairo',sans-serif;}
.sw-btn:hover{color:#EDEAD8;}
.sw-btn.active{color:#D4A574;border-bottom-color:#D4A574;}
.sw-spacer{flex:1;}
.sw-note{font-size:11px;color:#40404E;white-space:nowrap;font-family:'Inter',sans-serif;}

/* ── IFRAME PANEL ── */
.preview-panel{display:none;width:100%;height:calc(100vh - 52px);}
.preview-panel.active{display:block;}
.preview-panel iframe{width:100%;height:100%;border:none;}
</style>
</head>
<body>

<div id="switcher">
  <div class="sw-logo">ڕ</div>
  <span class="sw-label" style="font-family:'Inter',sans-serif">Review Templates</span>
  <button class="sw-btn active" onclick="show('wb',this)">میزی پێداچوونەوە</button>
  <button class="sw-btn" onclick="show('cv',this)">بینەری زنجیرە</button>
  <button class="sw-btn" onclick="show('rs',this)">پوختەی PDF</button>
  <div class="sw-spacer"></div>
  <span class="sw-note">Mock data · Django renders these at runtime</span>
</div>

<div class="preview-panel active" id="panel-wb">
  <iframe src="review_workbench_preview.html"></iframe>
</div>
<div class="preview-panel" id="panel-cv">
  <iframe src="chain_viewer_preview.html"></iframe>
</div>
<div class="preview-panel" id="panel-rs">
  <iframe src="review_summary_preview.html"></iframe>
</div>

<script>
function show(id, btn) {
  document.querySelectorAll('.preview-panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.sw-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('panel-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
}
</script>
</body>
</html>
