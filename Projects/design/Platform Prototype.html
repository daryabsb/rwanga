<!DOCTYPE html>
<html lang="ku" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ڕوانگە — میوانێکی نادیار</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --bg:       #141418; --bg2:#1C1C24; --bg3:#242430; --bg4:#2E2E3C;
  --border:   #2A2A38; --border2:#222230;
  --text:     #E4E0D8; --text2:#8A8A9E; --text3:#52506A;
  --accent:   #D4A574; --accent2:#E8C99A; --accent3:#B8875A;
  --accent-dim:rgba(212,165,116,.12);
  --sidebar:  #0D0D14;
  --col-s:#E07F3A; --col-b:#4B7BE5; --col-v:#18A88C; --col-p:#8B5CF6; --col-sh:#E5456A;
  --surface:var(--bg2); --r:8px; --r-sm:5px; --t:.15s ease;
}
[data-theme="light"] {
  --bg:#F4F4F8; --bg2:#FFFFFF; --bg3:#F0F0F6; --bg4:#E4E4EE;
  --border:#DCDCEC; --border2:#ECECF4;
  --text:#1A1A2E; --text2:#6B6B88; --text3:#A0A0BC;
  --accent:#9E5E2A; --accent2:#B8722E; --accent3:#7A4518;
  --accent-dim:rgba(158,94,42,.1);
  --sidebar:#1C1C28;
}
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Cairo',system-ui,sans-serif;font-size:14px}
/* Latin/numeric content uses Inter for tighter optical sizing */
[dir="rtl"] .en,[dir="rtl"] .lens-val,[dir="rtl"] .mono{font-family:'Inter',system-ui,sans-serif;font-size:.92em}
button,input{font-family:inherit}
a{color:var(--accent);text-decoration:none}
/* Arabic/Kurdish explicit sizes — Cairo renders ~8% larger optically than Latin equivalents */
h1,h2{font-size:1.45em;font-weight:700}
.small-ar{font-size:11px}
.xsmall-ar{font-size:10px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* ── APP LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden;direction:inherit}

/* ── ICON SIDEBAR ── */
/* First in DOM → rightmost in RTL, leftmost in LTR (automatic via dir) */
#icon-sidebar{
  width:64px;background:var(--sidebar);display:flex;flex-direction:column;
  align-items:center;padding:14px 0;gap:4px;flex-shrink:0;z-index:50;
}
.brand-mark{
  width:42px;height:42px;border-radius:10px;background:var(--col-s);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:700;color:#fff;margin-bottom:18px;cursor:pointer;
  font-family:'Cairo',sans-serif;letter-spacing:0;
}
.side-btn{
  width:42px;height:42px;border-radius:var(--r-sm);display:flex;
  align-items:center;justify-content:center;cursor:pointer;
  color:var(--text3);font-size:18px;transition:background var(--t),color var(--t);border:none;background:none;
}
.side-btn:hover{background:rgba(255,255,255,.08);color:var(--text2)}
.side-btn.active{background:rgba(255,255,255,.15);color:#fff}
.side-sep{width:32px;height:1px;background:rgba(255,255,255,.08);margin:8px 0}
.side-spacer{flex:1}

/* ── MAIN AREA ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── TOP NAV ── */
#topnav{
  height:48px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:4px;flex-shrink:0;z-index:40;
}
.tn-project{display:flex;align-items:center;gap:10px;padding-inline-end:16px;border-inline-end:1px solid var(--border)}
.tn-cover{width:26px;height:26px;border-radius:5px;background:var(--col-s);flex-shrink:0}
.tn-name{font-size:13px;font-weight:600;white-space:nowrap}
.section-tabs{display:flex;gap:2px;margin-inline-start:8px}
.sec-tab{
  display:flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;
  font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);
  transition:background var(--t),color var(--t);white-space:nowrap;border:none;background:none;
}
.sec-tab:hover{background:var(--bg3);color:var(--text)}
.sec-tab.active{color:#fff}
.sec-tab[data-s="s"].active{background:var(--col-s)}
.sec-tab[data-s="b"].active{background:var(--col-b)}
.sec-tab[data-s="v"].active{background:var(--col-v)}
.sec-tab[data-s="p"].active{background:var(--col-p)}
.sec-tab[data-s="sh"].active{background:var(--col-sh)}
.sec-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.tn-spacer{flex:1}
.tn-actions{display:flex;align-items:center;gap:8px}
.btn-export{
  display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--r-sm);
  background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer;border:none;
}
.btn-export:hover{background:var(--accent2)}
.btn-ai{
  display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:var(--r-sm);
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  font-size:12px;font-weight:500;cursor:pointer;transition:border-color var(--t),color var(--t);
}
.btn-ai:hover{border-color:var(--accent);color:var(--accent)}
.user-ava{
  width:28px;height:28px;border-radius:50%;background:var(--col-b);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;
}

/* ── CONTENT AREA ── */
#content-area{flex:1;display:flex;overflow:hidden}

/* ══ DASHBOARD VIEW ══ */
#dash-view{flex:1;overflow-y:auto}
.proj-header{
  display:flex;align-items:center;gap:20px;padding:28px 32px 24px;
  background:var(--surface);border-bottom:1px solid var(--border);
}
.proj-cover{
  width:100px;height:100px;border-radius:12px;background:var(--col-s);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:36px;
}
.proj-title{font-size:22px;font-weight:700;margin-bottom:4px}
.proj-sub{font-size:13px;color:var(--text2)}
.dash-body{padding:24px 32px;display:flex;flex-direction:column;gap:12px}
.sec-row{
  display:flex;align-items:stretch;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--r);overflow:hidden;
}
.sec-block{
  width:84px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;padding:20px 8px;cursor:pointer;opacity:.95;
  transition:opacity var(--t);
}
.sec-block:hover{opacity:1}
.sec-block span{font-size:10px;font-weight:600;color:#fff;text-align:center;line-height:1.4}
.sec-modules{
  flex:1;display:flex;flex-wrap:wrap;
  border-inline-start:1px solid var(--border);
}
.mod-card{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:20px 18px;cursor:pointer;min-width:110px;
  border-inline-start:1px solid var(--border);transition:background var(--t);
}
.mod-card:first-child{border-inline-start:none}
.mod-card:hover{background:var(--bg3)}
.mod-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.mod-name{font-size:11px;font-weight:500;color:var(--text2);text-align:center;line-height:1.4}
.ai-tag{
  font-size:8px;font-weight:700;background:linear-gradient(135deg,var(--col-s),var(--col-sh));
  color:#fff;padding:1px 5px;border-radius:3px;letter-spacing:.5px;
}

/* ══ SCENE VIEW ══ */
#scene-view{flex:1;display:flex;overflow:hidden}

/* Scene list panel — first in this flex → right in RTL, left in LTR */
#scene-panel{
  width:220px;background:var(--surface);border-inline-start:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
}
.panel-hdr{
  padding:10px 14px;border-bottom:1px solid var(--border);
  font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;
}
.scene-search-wrap{padding:8px 10px;border-bottom:1px solid var(--border)}
.scene-search-wrap input{
  width:100%;border:1px solid var(--border);border-radius:var(--r-sm);
  padding:6px 10px;font-size:12px;color:var(--text);background:var(--bg3);
  outline:none;transition:border-color var(--t);
}
.scene-search-wrap input:focus{border-color:var(--accent)}
.scene-search-wrap input::placeholder{color:var(--text3)}
.group-row{
  display:flex;align-items:center;gap:6px;padding:6px 12px;
  font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);cursor:pointer;
}
.group-row input{accent-color:var(--accent);width:13px;height:13px;cursor:pointer}
.scene-list-body{flex:1;overflow-y:auto;padding:4px 0}
.scene-grp-hdr{
  padding:8px 14px 3px;font-size:9px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.7px;
}
.scene-item{
  display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;
  border-radius:5px;margin:1px 5px;transition:background var(--t);
}
.scene-item:hover{background:var(--bg3)}
.scene-item.active{background:var(--accent-dim)}
.sc-num{font-size:10px;font-weight:700;color:var(--text3);min-width:18px;text-align:center}
.scene-item.active .sc-num{color:var(--accent)}
.sc-body{flex:1;min-width:0}
.sc-loc{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-time{font-size:10px;color:var(--text3)}
.scene-item.active .sc-loc{color:var(--accent);font-weight:600}

/* Scene main */
#scene-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#scene-topbar{
  padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
/* Breadcrumb bar */
#breadcrumb-bar{
  display:flex;align-items:center;gap:10px;
  padding:0 24px;height:46px;
  background:var(--bg3);border-bottom:2px solid var(--border);
  flex-shrink:0;
}
.breadcrumb-back{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:var(--accent);
  cursor:pointer;padding:7px 14px;border-radius:var(--r-sm);
  border:1px solid var(--accent);background:var(--accent-dim);
  transition:background var(--t),color var(--t);white-space:nowrap;
}
.breadcrumb-back:hover{background:var(--accent);color:#fff}
.bc-sep{color:var(--text3);font-size:13px;padding:0 2px}
.bc-current{font-size:13px;font-weight:700;color:var(--text)}
.bc-loc{font-size:12px;color:var(--text2)}
/* Theme toggle in topnav */
.theme-toggle-btn{
  width:34px;height:34px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--bg3);
  color:var(--text2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color var(--t),color var(--t),background var(--t);
}
.theme-toggle-btn:hover{border-color:var(--accent);color:var(--accent)}
.scene-title-txt{font-size:15px;font-weight:700}
.scene-meta-txt{font-size:12px;color:var(--text2)}
.scene-tags{display:flex;gap:6px;flex-wrap:wrap}
.stag{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;
  background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.stag-ai{border-color:var(--accent);color:var(--accent)}

/* Module tabs */
#mod-tabs{
  display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;padding:0 16px;
}
.mod-tab{
  padding:10px 16px;font-size:12px;font-weight:500;color:var(--text2);
  cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;
  transition:color var(--t),border-color var(--t);
}
.mod-tab:hover{color:var(--text)}
.mod-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* Tab content */
#tab-content{flex:1;overflow-y:auto;background:var(--bg)}
.tab-pane{display:none;padding:24px}
.tab-pane.active{display:block}

/* ── SHARED COMPONENTS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px}
.card h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px}
.card p{font-size:13px;color:var(--text2);line-height:1.7}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 16px;text-align:center;min-width:80px}
.sv{font-size:22px;font-weight:700;color:var(--accent)}
.sl{font-size:9px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.8px}
.section-hdr{font-size:12px;font-weight:700;color:var(--text);margin:18px 0 10px;
  padding-bottom:6px;border-bottom:1px solid var(--border)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}

/* Shot table */
.shot-table{width:100%;border-collapse:collapse}
.shot-table th{
  padding:9px 12px;text-align:start;font-size:9px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.8px;background:var(--bg3);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;
}
.shot-table td{padding:10px 12px;font-size:12px;border-bottom:1px solid var(--border2);vertical-align:middle}
.shot-row{cursor:pointer;transition:background var(--t)}
.shot-row:hover td{background:var(--bg3)}
.shot-row.s-d{border-inline-end:3px solid #F5D76E}
.shot-row.s-v{border-inline-end:3px solid #555}
.shot-row.s-i{border-inline-end:3px solid #6BA3D6}
.snum{font-weight:700;color:var(--accent);font-size:12px}
.setup-chip{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;
  font-weight:700;background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.tbadge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600}
.tb-d{background:rgba(245,215,110,.15);color:#F5D76E;border:1px solid rgba(245,215,110,.3)}
.tb-v{background:rgba(180,180,180,.08);color:var(--text2);border:1px solid var(--border)}
.tb-i{background:rgba(107,163,214,.15);color:#6BA3D6;border:1px solid rgba(107,163,214,.3)}
.exp-row{display:none}
.exp-row.open{display:table-row}
.exp-row td{background:var(--bg3);padding:14px 16px;border-bottom:1px solid var(--border)}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.f-val{font-size:12px;color:var(--text);line-height:1.5}
.notes-chip{background:var(--accent-dim);border:1px solid rgba(212,165,116,.25);border-radius:var(--r-sm);
  padding:8px 12px;font-size:11px;color:var(--text2);margin-top:8px;line-height:1.6}

/* Storyboard */
.sb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.sb-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;cursor:pointer;transition:border-color var(--t)}
.sb-card:hover{border-color:var(--accent)}
.sb-thumb{
  aspect-ratio:16/9;background:var(--bg3);display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:4px;
  border-bottom:1px solid var(--border);font-family:monospace;color:var(--text3);font-size:10px;
}
.sb-shot-num{font-size:18px;font-weight:700;color:var(--accent)}
.sb-meta{padding:8px 10px}
.sb-num{font-size:10px;font-weight:700;color:var(--accent)}
.sb-style{font-size:10px;color:var(--text2);margin-top:2px}
.sb-lens{font-size:9px;background:var(--bg3);padding:1px 5px;border-radius:3px;color:var(--text3);margin-top:4px;display:inline-block}

/* Floor plan */
.fp-controls{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fp-btn{padding:5px 12px;border-radius:20px;font-size:11px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;color:var(--text2);transition:all var(--t)}
.fp-btn:hover{border-color:var(--accent);color:var(--accent)}
.fp-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.fp-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;overflow:auto;margin-bottom:14px}

/* Schedule */
.sched-list{display:flex;flex-direction:column;gap:6px}
.sched-row{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:11px 16px;display:grid;grid-template-columns:90px 1fr auto;gap:12px;align-items:start;
}
.sched-row.break-r{background:var(--bg);border-style:dashed;color:var(--text3)}
.sched-row.hi-r{border-inline-end:3px solid var(--col-sh)}
.s-time{font-size:10px;color:var(--text3);font-family:monospace}
.s-dur{font-weight:700;color:var(--text);font-size:11px}
.s-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.s-shots{font-size:11px;color:var(--text2)}
.s-notes{font-size:10px;color:var(--text3);margin-top:2px;font-style:italic}
.s-cast{font-size:11px;color:var(--text2);text-align:end}
.pri-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;
  background:rgba(229,69,106,.15);color:var(--col-sh);border:1px solid rgba(229,69,106,.3);text-transform:uppercase}

/* Lighting */
.ct-bar{display:flex;border-radius:5px;overflow:hidden;height:26px;margin:10px 0}
.ct-seg{display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:rgba(0,0,0,.65);flex:1}
.light-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.light-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 13px}
.lc-num{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:4px}
.lc-desc{font-size:11px;color:var(--text2);line-height:1.5}

/* Props */
.prop-cat-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
  padding:2px 8px;border-radius:3px;display:inline-block;margin-bottom:8px}
.cat-a{background:rgba(229,69,106,.15);color:var(--col-sh);border:1px solid rgba(229,69,106,.3)}
.cat-b{background:rgba(212,165,116,.12);color:var(--accent);border:1px solid rgba(212,165,116,.3)}
.cat-c{background:rgba(24,168,140,.12);color:var(--col-v);border:1px solid rgba(24,168,140,.3)}
.check-item{display:flex;align-items:flex-start;gap:10px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;margin-bottom:5px}
.check-item input{width:15px;height:15px;margin-top:2px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
.ci-name{font-size:12px;color:var(--text);font-weight:500}
.ci-note{font-size:10px;color:var(--text2);margin-top:2px;line-height:1.5}
.ci-shots{font-size:9px;color:var(--accent);margin-top:2px}

/* Wardrobe */
.wc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.wc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;border-top:4px solid}
.wc-card.nali{border-top-color:var(--col-b)}
.wc-card.gesha{border-top-color:var(--col-p)}
.wc-name{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:10px}
.wc-row{display:flex;gap:6px;font-size:12px;color:var(--text2);margin-bottom:5px;line-height:1.5}
.wc-row strong{color:var(--text);min-width:70px;flex-shrink:0}

/* Continuity */
.flow-row{display:flex;align-items:center;gap:0;margin:12px 0}
.flow-node{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:10px 14px;text-align:center;flex:1}
.flow-node.cur{border-color:var(--accent);background:var(--accent-dim)}
.fn-num{font-size:18px;font-weight:700;color:var(--accent)}
.fn-lbl{font-size:10px;color:var(--text2);margin-top:2px}
.flow-arr{font-size:18px;color:var(--text3);padding:0 6px}
.cont-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* Sound */
.sound-list{display:flex;flex-direction:column}
.sound-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border2)}
.sound-item:last-child{border-bottom:none}
.si-icon{font-size:18px;width:26px;flex-shrink:0;padding-top:2px}
.si-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.si-title.crit{color:var(--col-sh)}
.si-desc{font-size:11px;color:var(--text2);line-height:1.5}

/* Warn box */
.warn{display:flex;gap:10px;background:rgba(229,69,106,.08);border:1px solid rgba(229,69,106,.25);
  border-radius:var(--r-sm);padding:11px 14px;margin-bottom:14px}
.warn-icon{font-size:15px;flex-shrink:0}
.warn-text{font-size:12px;color:var(--col-sh);line-height:1.5}

/* Filters */
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.f-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);cursor:pointer;font-size:11px;transition:all var(--t)}
.f-btn:hover{border-color:var(--accent);color:var(--accent)}
.f-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* Overview movements */
.mov-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}
.mov-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;border-top:3px solid var(--accent3)}
.mov-n{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.mov-t{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:6px}
.mov-d{font-size:11px;color:var(--text2);line-height:1.6}

/* Responsive */
@media(max-width:900px){
  .grid-2,.wc-grid,.cont-grid,.light-grid,.mov-cards{grid-template-columns:1fr}
  #scene-panel{width:180px}
  .dash-body{padding:16px}
}

function buildDash() {

  body.innerHTML = sections.map(sec => `

// ── SCENE LIST ──
let sceneFilter = '';
function filterScenes(q) { sceneFilter = q; renderSceneList(); }

function renderSceneList() {
  const grouped = document.getElementById('group-toggle').checked;
  const q = sceneFilter.toLowerCase();
  const body = document.getElementById('scene-list-body');
  const filtered = allScenes.filter(s =>
    s.loc.includes(sceneFilter) || String(s.n).includes(q) || s.time.includes(sceneFilter)
  );
  if (grouped) {
    const groups = {};
    filtered.forEach(s => { if(!groups[s.loc]) groups[s.loc]=[]; groups[s.loc].push(s); });
    body.innerHTML = Object.entries(groups).map(([loc,scenes]) => `
      <div class="scene-grp-hdr">${loc}</div>
      ${scenes.map(s => sceneItem(s)).join('')}
    `).join('');
  } else {
    body.innerHTML = filtered.map(s => sceneItem(s)).join('');
  }
}

function sceneItem(s) {
  return `<div class="scene-item${s.n===12?' active':''}" onclick="selectScene(${s.n})">
    <span class="sc-num">${s.n}</span>
    <div class="sc-body"><div class="sc-loc">${s.loc}</div><div class="sc-time">${s.time}</div></div>
  </div>`;
}

function selectScene(n) {
  document.querySelectorAll('.scene-item').forEach(el => el.classList.toggle('active', el.textContent.trim().startsWith(String(n))));
}

// ── MODULE TABS ──
function buildTabs() {
  document.getElementById('mod-tabs').innerHTML = tabs.map(t =>
    `<div class="mod-tab${t.id==='overview'?' active':''}" onclick="showTab('${t.id}')">${t.label}</div>`
  ).join('');
  buildTabContent();
}

function showTab(id) {
  document.querySelectorAll('.mod-tab').forEach((t,i) => t.classList.toggle('active', tabs[i].id===id));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id==='pane-'+id));
}

// ── VIEW SWITCHING ──
function showDash() {
  document.getElementById('dash-view').style.display='';
  document.getElementById('scene-view').style.display='none';
}

function showScene(tabId) {
  document.getElementById('dash-view').style.display='none';
  document.getElementById('scene-view').style.display='flex';
  if(!document.getElementById('mod-tabs').innerHTML) buildTabs();
  renderSceneList();
  if(tabId) showTab(tabId);
}

// ── THEME TOGGLE ──
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  const icon = isDark ? '☽' : '☀';
  const tb = document.getElementById('topnav-theme');
  const sb = document.getElementById('theme-btn');
  if(tb) tb.textContent = icon;
  if(sb) sb.textContent = icon;
}

// ── CONTENT BUILDERS ──
function buildTabContent() {
  const tc = document.getElementById('tab-content');
  tc.innerHTML = tabs.map(t => `<div class="tab-pane${t.id==='overview'?' active':''}" id="pane-${t.id}">${buildPane(t.id)}</div>`).join('');
}

function buildPane(id) {
  if(id==='overview') return paneOverview();
  if(id==='shots') return paneShots();
  if(id==='storyboard') return paneStoryboard();
  if(id==='floorplan') return paneFloorplan();
  if(id==='schedule') return paneSchedule();
  if(id==='lighting') return paneLighting();
  if(id==='sound') return paneSound();
  if(id==='props') return paneProps();
  if(id==='wardrobe') return paneWardrobe();
  if(id==='continuity') return paneContinuity();
  return '';
}

  const tb = document.getElementById('shot-tbody');
  if(tb) tb.innerHTML = renderShotRows(data);

function highlightSetup(l) {
  document.querySelectorAll('.cam-hit circle').forEach(c=>c.setAttribute('fill','#1F497D'));
  const el = document.getElementById('cam-'+l);
  if(el) el.setAttribute('fill','#D4A574');
  const d = setups[l];
  const shotDetails = d.shots.map(sn=>{const s=shots.find(x=>x.num===sn);return s?`<span style="color:var(--accent);font-weight:700">${s.num}</span> — ${s.style} (${s.lens}) · ${s.duration}`:''}).join('<br>');
  document.getElementById('setup-detail').innerHTML=`<h3>ئامادەکردنی ${l}</h3><p>${d.desc}</p><div style="margin-top:8px">${shotDetails}</div>`;
}

function selectSetup(l,btn) {
  document.querySelectorAll('.fp-controls .fp-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.querySelectorAll('.cam-hit circle').forEach(c=>c.setAttribute('fill','#1F497D'));
  if(l) highlightSetup(l);
}

function paneSchedule() {
  return `<div class="sched-list">${schedule.map(b=>{
    if(b.block==='BREAK') return `<div class="sched-row break-r">
      <div class="s-time">${b.time}<br><span class="s-dur">${b.dur}</span></div>
      <div><div class="s-title" style="color:var(--text3)">— ${b.title} —</div><div class="s-notes">${b.notes}</div></div>
      <div></div></div>`;
    return `<div class="sched-row${b.hi?' hi-r':''}">

}

function paneContinuity() {

  function chk(items) { return items.map(t=>`<div class="check-item"><input type="checkbox"><div><div class="ci-name">${t}</div></div></div>`).join(''); }
  return `
  <div class="section-hdr">ڕێڕەوی دیمەن</div>
  <div class="flow-row">
    <div class="flow-node"><div class="fn-num">١١</div><div class="fn-lbl">دەرەوە. باغ<br>گەیشتن</div></div>

    <div class="flow-node"><div class="fn-num">١٣</div><div class="fn-lbl">دەرەوە. باغ<br>نالی سەگ دەخوێنێت</div></div>

    <div><div class="section-hdr">هاتن لە دیمەنی ١١ ەوە</div>${chk(inItems)}</div>

  </div>
  <div class="card" style="margin-top:14px;border-inline-end:3px solid var(--col-sh)">
    <h3>دەرگای داخراو — داهاتووی گرنگ</h3>

  </div>`;
}
