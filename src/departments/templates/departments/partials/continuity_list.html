{% for scene, items in grouped.items %}
<div class="rw-card" style="margin-top:8px;padding:8px"><strong>Scene {{ scene.number }}</strong>
<ul>{% for item in items %}<li><input type="checkbox" {% if item.checked %}checked{% endif %} hx-post="{% url 'departments:toggle_continuity' project.pk item.pk %}" hx-vals='{"checked": this.checked}' hx-swap="none"> {{ item.direction }} - {{ item.description }}</li>{% endfor %}</ul></div>
{% empty %}<p>No continuity items.</p>{% endfor %}
