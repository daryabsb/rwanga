<!doctype html><html><head><meta charset="utf-8"><title>Scene Viewer</title><style>body{font-family:Arial,sans-serif;background:#111;color:#eee;padding:24px}.brand{font-size:28px;color:#f72585;font-weight:700}.card{border:1px solid #333;padding:12px;margin:12px 0}.tbl{width:100%;border-collapse:collapse}.tbl th,.tbl td{border:1px solid #444;padding:6px}</style></head><body><div class="brand">? Rwanga</div><h1>Scene {{ scene.number }} - {{ scene.title }}</h1><div class="card">{{ scene.summary }}</div><h2>Shots</h2><table class="tbl"><tr><th>#</th><th>Type</th><th>Description</th><th>Lens</th></tr><tbody id="shot-body"></tbody></table><h2>Departments</h2><pre id="dept"></pre><script>const DATA={{ payload_json|safe }};document.getElementById('shot-body').innerHTML=(DATA.shots||[]).map(s=>`<tr><td>${s.shot_number||''}</td><td>${s.shot_type||''}</td><td>${s.description||''}</td><td>${s.lens||''}</td></tr>`).join('');document.getElementById('dept').textContent=JSON.stringify(DATA.departments,null,2);</script></body></html>
