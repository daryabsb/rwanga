<!doctype html><html><head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif;font-size:12px}.logo{color:#f72585;font-size:24px;font-weight:700;margin-bottom:8px}.tbl{width:100%;border-collapse:collapse}.tbl th,.tbl td{border:1px solid #999;padding:6px}</style></head><body><div class="logo">? Rwanga</div><h2>Shot List - {{ project.title }}</h2><table class="tbl"><tr><th>Scene</th><th>Shot</th><th>Type</th><th>Description</th></tr>{% for shot in shots %}<tr><td>{{ shot.scene.number }}</td><td>{{ shot.shot_number }}</td><td>{{ shot.shot_type }}</td><td>{{ shot.description }}</td></tr>{% endfor %}</table></body></html>
