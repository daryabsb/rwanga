<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project.title }} Scenes</title>
</head>
<body>
    <h1>{{ project.title }} Scenes</h1>
    <ul>
        {% for scene in scenes %}
        <li>S{{ scene.number }}: {{ scene.title }}</li>
        {% empty %}
        <li>No scenes yet.</li>
        {% endfor %}
    </ul>
</body>
</html>
